# tmux config by proft [http://proft.me]

set -s set-clipboard on
# base
set -g set-titles on
set -g set-titles-string "#H > #W"

# automatically set window title
setw -g automatic-rename

set -g base-index 1

set -g history-limit 5000

#set window notifications
#setw -g monitor-activity on
#set -g visual-activity on

set -g display-time 2000
set -g status-interval 10

set -g status-left ''
set -g status-right '#[fg=green][#H]#[fg=red][cpu_number: #(cat /proc/cpuinfo |grep processor|wc -l)]#[fg=cyan][#(cut -d " " -f 1-3 /proc/loadavg)]#[fg=yellow][%H:%M, %d-%m-%y]'
set -g status-right-length 60

# 1. 开启全新的一键鼠标支持（必须保留，无报错）
set -g mouse on

# 2. 状态栏通用样式（文字白色，背景黑色）
set -g status-style fg=white,bg=default

# 3. 普通窗口标签样式（文字青色，背景默认透明）
set -g window-status-style fg=green,bg=default

# 4. 当前激活窗口标签样式（文字白色且加粗，背景红色）
set -g window-status-current-style fg=white,bold,bg=red

# 5. 提示信息/命令行样式（文字白色且加粗，背景黑色）
set -g message-style fg=white,bold,bg=default

# keys
unbind C-b
set -g prefix C-q

set -g status-keys vi

# 开启 copy 模式的 vim 快捷键
setw -g mode-keys vi

# 50-51行修改：在 Linux 下使用 v 开始选择，y 复制到系统剪贴板 (xclip)
# 如果您是 Mac 系统，请把后面的 "xclip -sel clip" 换成 "pbcopy"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip"

# 53-55行修改：更新 Enter 键同样为复制到系统剪贴板并退出
unbind-key -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -sel clip"

# 58-59行修改：使用 Alt + 方向左右键 切换标签页（窗口）
# 如果需要启用，直接删掉前面的 # 号即可
bind-key -n M-Right next-window
bind-key -n M-Left previous-window

bind-key -n M-Up    select-pane -U
bind-key -n M-Down  select-pane -D
bind-key -n M-Left  select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-k select-pane -U
bind-key -n M-h select-pane -R
bind-key -n M-l select-pane -L
bind-key -n M-j select-pane -D

# vim resize panel
bind-key -n M-< resize-pane -L 1
bind-key -n M-> resize-pane -R 1

# splitting
unbind %
bind h split-window -h
unbind '"'
bind v split-window -v

# last window
unbind l
bind a last-window

# reload config
bind r source-file ~/.tmux.conf

# kill current window
bind-key k confirm kill-window

# detach
#bind-key -n C-j detach

# switch windows alt+number
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

#set -g status 2
#set -g status-interval 1
#set -g status-format[1] "#[fg=yellow]AI: #[fg=brightblack]#{?@ai_suggestion,#{@ai_suggestion},...} #[align=right]#[fg=red]Author:#H"

set -g default-shell /bin/zsh
set -g default-command /bin/zsh
# 1. 明确启用 2 行状态栏
set -g status 2
set -g status-interval 1

# 2. 第一行：完美锁死在第 0 行，保留你最原始的、绝不出错的标志性底栏样式
set -g status-format[0] "#[fg=green][#S] #[fg=sky]#I:#W#F #[align=right]#[fg=yellow]\"#H\" %H:%M %d-%b-%y"

# 3. 第二行：精准锁死在第 1 行。使用全新的高级无冲突语法读取全局变量 @ai_suggestion
# 如果变量里有东西就展示，没东西就展示三个点，完全由 Tmux 原生驱动！
set -g status-format[1] "#[fg=yellow]AI : #[fg=red]#{@ai_suggestion}"


# 保持底栏背景色
set -g status-style "bg=default"
